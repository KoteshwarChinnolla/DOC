<!DOCTYPE HTML>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Chinnolla Koteshwar - Portfolio & Resumes"/>
    <meta property="og:description" content="AI/ML Engineer specializing in Autonomous Systems and Cloud Infrastructure."/>
    
    <title>Chinnolla Koteshwar</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 {
            margin-top: 0;
            color: #003399; /* Matches your LaTeX accent color */
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .btn-primary {
            background-color: #003399;
            color: white;
        }
        .btn-primary:hover {
            background-color: #002266;
        }
        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }
        .btn-secondary:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Chinnolla Koteshwar</h1>
    <p>AI & DevOps Engineer | Robotics & LLMs</p>
    
    <div class="btn-container">
        <a href="./resume.pdf" class="btn btn-primary">View Resume (1-Page)</a>
        <a href="./cv.pdf" class="btn btn-secondary">View Academic CV</a>
    </div>
</div>

</body>
</html>
